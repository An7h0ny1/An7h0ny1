name: Generate VHS GIFs 📼

on:
  push:
    paths:
      - '.vhs/*.tape'
  workflow_dispatch:

jobs:
  vhs:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg and ttyd
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

          sudo curl -L https://github.com/tsl0922/ttyd/releases/download/1.7.2/ttyd.x86_64 -o /usr/local/bin/ttyd
          sudo chmod +x /usr/local/bin/ttyd
        
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install VHS
        run: |
          go install github.com/charmbracelet/vhs@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Prepare data files
        run: |
          sudo mkdir -p /var/www /var/log

          echo '{"usuario":{"nombre":"Anthony Danilo Parra Munoz","alias":"An7h0ny1","rol":"Ingeniero de Sistemas | Especialista Backend","ubicacion":"Narino, Colombia","contacto":"antho7294@gmail.com"},"stack_principal":["Java","Spring Boot","NestJS","TypeScript","Python"],"habilidades_clave":["Arquitecturas Multi-tenant","Web Scraping de Alto Rendimiento","CI/CD Pipelines","Diseno de APIs REST escalables"],"estado_actual":"Orquestando procesos de alta concurrencia..."}' | sudo tee /var/www/about_me.config.json

          sudo tee /var/log/mission_history.log > /dev/null << 'LOGEOF'
          [TIMESTAMP: RECUPERANDO REGISTROS...]
          --------------------------------------------------------------------
          > ID_ACCESO : [MISION #01]
          > OBJETIVO  : IUPI - FINTECH STARTUP
          > ESTADO    : [SUCCESS] OPERACION COMPLETADA
          > STACK     : NestJS - PostgreSQL - WebSockets - Web Scraping
          > RESULTADOS:
              - Motor de scraping de activos financieros en tiempo real
              - Streaming de datos via WebSockets (latencia sub-100ms)
              - Optimizacion de queries para alta concurrencia
          --------------------------------------------------------------------
          > ID_ACCESO : [MISION #02]
          > OBJETIVO  : NO COUNTRY - SAAS DE INVENTARIOS
          > ESTADO    : [SUCCESS] OPERACION COMPLETADA
          > STACK     : Spring Boot - PostgreSQL JSONB - Multi-tenant
          > RESULTADOS:
              - Arquitectura multi-tenant aislada y escalable
              - Integracion JSONB con schemas dinamicos
              - API REST con [SECURITY_LEVEL: HIGH] por tenant
          --------------------------------------------------------------------
          > ID_ACCESO : [MISION #03]
          > OBJETIVO  : VETCARE - SECTOR SALUD
          > ESTADO    : [SUCCESS] OPERACION COMPLETADA
          > STACK     : Spring Boot - Docker - CI/CD - GitHub Actions
          > RESULTADOS:
              - Digitalizacion de historias clinicas veterinarias
              - Reduccion del 40% en tiempo de deploy
              - Orquestacion automatizada de contenedores
          --------------------------------------------------------------------
          LOGEOF

      - name: Verify files exist
        run: |
          echo "=== about_me.config.json ===" && cat /var/www/about_me.config.json
          echo "=== mission_history.log ===" && cat /var/log/mission_history.log

      - name: Generate About Me GIF
        run: vhs .vhs/about_me.tape

      - name: Generate Mission Log GIF
        run: vhs .vhs/mission_log.tape

      - name: Commit GIFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update VHS GIFs"
          branch: output
          create_branch: true
          push_options: '--force'
          file_pattern: 'dist/*.gif'