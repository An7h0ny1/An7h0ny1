name: Generate VHS GIFs 📼

on:
  push:
    paths:
      - '.vhs/*.tape'
  workflow_dispatch:

jobs:
  vhs:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd

      - name: Install VHS
        run: |
          sudo snap install vhs

      - name: Generate About Me GIF
        run: vhs .vhs/about_me.tape

      - name: Generate Mission Log GIF
        run: vhs .vhs/mission_log.tape

      - name: Commit GIFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update VHS GIFs"
          branch: output
          create_branch: true
          push_options: '--force'
          file_pattern: 'dist/*.gif'