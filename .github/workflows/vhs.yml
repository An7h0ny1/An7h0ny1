name: Generate VHS GIFs 📼

on:
  push:
    paths:
      - '.vhs/*.tape'
  workflow_dispatch:

jobs:
  vhs:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          # Hacemos symlink para que vhs lo encuentre donde lo busca
          sudo ln -sf $(which ffmpeg) /usr/local/bin/ffmpeg

      - name: Setup VHS - About Me
        uses: charmbracelet/vhs-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: '.vhs/about_me.tape'

      - name: Setup VHS - Mission Log
        uses: charmbracelet/vhs-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: '.vhs/mission_log.tape'

      - name: Commit Action generated GIFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update VHS GIFs"
          branch: output
          create_branch: true
          push_options: '--force'
          file_pattern: 'dist/*.gif'